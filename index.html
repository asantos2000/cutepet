<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CutePet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(ellipse at top, #1e1b4b, #0f0f1a);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', 'Courier New', monospace;
  }

  /* ── Device shell ── */
  .device {
    background: linear-gradient(160deg, #3b3a5e, #252438);
    border-radius: 36px 36px 48px 48px;
    padding: 20px 20px 32px;
    width: 320px;
    box-shadow:
      0 30px 60px #00000080,
      0 0 0 3px #4a4870,
      inset 0 2px 6px #ffffff18,
      inset 0 -4px 8px #00000040;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Screen bezel ── */
  .screen-bezel {
    background: #1a1828;
    border-radius: 20px;
    padding: 10px;
    box-shadow: inset 0 4px 12px #00000080, 0 2px 4px #ffffff0a;
    width: 100%;
  }

  /* ── LCD screen ── */
  .screen {
    background: #c8e8a0;
    border-radius: 12px;
    height: 300px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* CRT scanlines */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent 0px, transparent 2px,
      rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 3px
    );
    pointer-events: none;
    z-index: 5;
    border-radius: 12px;
  }

  /* ── Top bar ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 12px 6px;
    background: #a8cc70;
    border-radius: 12px 12px 0 0;
    flex-shrink: 0;
  }

  .pet-name {
    font-size: 8px;
    color: #2a4a00;
  }

  .age-badge {
    font-size: 6px;
    color: #2a4a00;
    background: #90b858;
    padding: 2px 7px;
    border-radius: 4px;
  }

  .mood-emoji {
    font-size: 16px;
    line-height: 1;
  }

  /* ── Stats panel ── */
  .stats {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px 12px 6px;
    background: #b8d888;
    flex-shrink: 0;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat-icon {
    font-size: 14px;
    width: 18px;
    text-align: center;
    flex-shrink: 0;
    line-height: 1;
  }

  .bar-track {
    flex: 1;
    height: 8px;
    background: #7aa040;
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: #2a4a00;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .bar-fill.low {
    background: #cc2200;
    animation: pulse-bar 0.9s ease infinite;
  }
  .bar-fill.mid { background: #886600; }

  @keyframes pulse-bar {
    0%,100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  .stat-val {
    font-size: 7px;
    color: #2a4a00;
    width: 22px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── Pet viewport ── */
  .pet-area {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 14px;
    position: relative;
    overflow: hidden;
  }

  .ground {
    position: absolute;
    bottom: 10px;
    left: 8%;
    right: 8%;
    height: 3px;
    background: #90b858;
    border-radius: 2px;
  }

  .pet-canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    position: relative;
    z-index: 2;
    /* render at 3× for a big, clear pet */
    width: 144px;
    height: 144px;
  }

  /* ── Message ── */
  .message-box {
    background: #2a4a00;
    padding: 6px 12px;
    font-size: 7px;
    color: #c8e860;
    text-align: center;
    min-height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0 0 12px 12px;
    flex-shrink: 0;
    letter-spacing: 0.5px;
    z-index: 2;
    position: relative;
  }

  /* ── Particles ── */
  .particle {
    position: absolute;
    font-size: 22px;
    pointer-events: none;
    animation: floatUp 1.4s ease forwards;
    z-index: 10;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(0.8); }
    60%  { opacity: 1; transform: translateY(-55px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-85px) scale(0.6); }
  }

  /* ── Buttons ── */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 20px;
    width: 100%;
    padding: 0 4px;
  }

  .btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
  }

  .btn {
    background: linear-gradient(145deg, #312f52, #1e1c36);
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 6px 0 #0d0c1e,
      0 8px 16px #00000060,
      inset 0 1px 2px #ffffff18;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    flex-shrink: 0;
  }

  .btn:hover {
    background: linear-gradient(145deg, #3e3c62, #28264a);
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #0d0c1e, 0 10px 20px #00000070, inset 0 1px 2px #ffffff18;
  }

  .btn:active {
    transform: translateY(5px);
    box-shadow: 0 1px 0 #0d0c1e, 0 2px 6px #00000060, inset 0 1px 2px #ffffff18;
  }

  .btn-label {
    font-size: 6px;
    color: #8888bb;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    /* ensure label is always below the button, never behind */
    position: relative;
    z-index: 1;
  }

  /* ── Brand ── */
  .device-label {
    text-align: center;
    margin-top: 16px;
    font-size: 8px;
    color: #4a4870;
    letter-spacing: 5px;
  }

  /* ── Game over ── */
  .game-over {
    position: absolute;
    inset: 0;
    background: rgba(8,16,0,0.90);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 20;
    border-radius: 12px;
  }

  .game-over .go-icon  { font-size: 38px; }
  .game-over .go-title { font-size: 8px;  color: #c8e860; }
  .game-over .go-sub   { font-size: 6px;  color: #7aaa30; }

  .restart-btn {
    margin-top: 6px;
    background: #2a4a00;
    border: 2px solid #c8e860;
    color: #c8e860;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 7px;
    letter-spacing: 1px;
    transition: background 0.15s;
  }
  .restart-btn:hover { background: #4a7a00; }
</style>
</head>
<body>
<div class="device">
  <div class="screen-bezel">
    <div class="screen" id="screen">

      <div class="top-bar">
        <span class="pet-name">MOCHI</span>
        <span class="age-badge" id="ageIndicator">AGE 0m</span>
        <span class="mood-emoji" id="moodIndicator">😊</span>
      </div>

      <div class="stats">
        <div class="stat-row">
          <span class="stat-icon">🍔</span>
          <div class="bar-track"><div class="bar-fill" id="hungerBar" style="width:80%"></div></div>
          <span class="stat-val" id="hungerVal">80</span>
        </div>
        <div class="stat-row">
          <span class="stat-icon">💖</span>
          <div class="bar-track"><div class="bar-fill" id="happyBar" style="width:80%"></div></div>
          <span class="stat-val" id="happyVal">80</span>
        </div>
        <div class="stat-row">
          <span class="stat-icon">⚡</span>
          <div class="bar-track"><div class="bar-fill" id="energyBar" style="width:80%"></div></div>
          <span class="stat-val" id="energyVal">80</span>
        </div>
        <div class="stat-row">
          <span class="stat-icon">❤️</span>
          <div class="bar-track"><div class="bar-fill" id="healthBar" style="width:80%"></div></div>
          <span class="stat-val" id="healthVal">80</span>
        </div>
      </div>

      <div class="pet-area" id="petArea">
        <div class="ground"></div>
        <canvas class="pet-canvas" id="petCanvas" width="48" height="48"></canvas>
      </div>

      <div class="message-box" id="messageBox">Hello! I'm Mochi~ Take care of me!</div>
    </div>
  </div>

  <div class="buttons">
    <div class="btn-wrap">
      <button class="btn" id="btnFeed">🍎</button>
      <span class="btn-label">Feed</span>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="btnPet">🤚</button>
      <span class="btn-label">Pet</span>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="btnPlay">🎮</button>
      <span class="btn-label">Play</span>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="btnSleep">💤</button>
      <span class="btn-label">Sleep</span>
    </div>
  </div>

  <div class="device-label">CUTEPET</div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const MAX = 100;
let state = {
  hunger: 80, happy: 80, energy: 80, health: 80,
  age: 0, alive: true, sleeping: false,
  animState: 'idle', animTimer: 0,
};

// ─── DOM ──────────────────────────────────────────────────────────────────────
const hungerBar = document.getElementById('hungerBar');
const happyBar  = document.getElementById('happyBar');
const energyBar = document.getElementById('energyBar');
const healthBar = document.getElementById('healthBar');
const hungerVal = document.getElementById('hungerVal');
const happyVal  = document.getElementById('happyVal');
const energyVal = document.getElementById('energyVal');
const healthVal = document.getElementById('healthVal');
const msgBox    = document.getElementById('messageBox');
const moodEl    = document.getElementById('moodIndicator');
const ageEl     = document.getElementById('ageIndicator');
const petArea   = document.getElementById('petArea');
const canvas    = document.getElementById('petCanvas');
const ctx       = canvas.getContext('2d');

// ─── Messages ─────────────────────────────────────────────────────────────────
const messages = {
  idle:     ['...', 'Looking at you~', 'La la la...', 'Feeling cozy!', '*yawns*'],
  hungry:   ["I'm hungry!", 'Feed me please!', 'My tummy hurts...', 'Food? Food?!'],
  sad:      ["I'm lonely...", 'Pet me!', "I need attention!", "Don't ignore me~"],
  tired:    ['Yawn...', 'So sleepy...', 'Need rest...', '*eyes drooping*'],
  sick:     ['Not feeling well...', 'I need care!', 'Ouch...'],
  eating:   ['Yum yum!', 'Delicious!', 'So good!', 'Nom nom nom!'],
  petting:  ['Purr~', 'So nice!', 'I love you!', '♥ ♥ ♥'],
  playing:  ['Wheee!', 'This is fun!', 'Again! Again!', 'Yay!'],
  sleeping: ['Zzz...', '...zzz...', 'Sweet dreams~'],
  wakeup:   ['Good morning!', 'I feel refreshed!', 'That was nice!'],
  dead:     ['...', 'Goodbye...'],
};
function rnd(k) { const a = messages[k]; return a[Math.floor(Math.random()*a.length)]; }
function showMsg(t) { msgBox.textContent = t; }

// ─── Pixel pet — 48×48 canvas, each cell = 4px, scaled 3× via CSS ─────────
// Pet is drawn on a 48×48 logical pixel canvas.
// CSS makes it 144×144 on screen (3× crisp scale).
// Grid: 12×12 cells of 4px each.

const S = 4; // pixels per cell

function cell(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * S, y * S, S, S);
}

// Palette — kawaii pastel cat
const P = {
  body:   '#7c5cbf',  // lavender purple
  tummy:  '#b89ee0',  // lighter belly
  outline:'#3d2070',  // dark outline/shadow
  eyeW:   '#ffffff',  // eye white
  pupil:  '#3d2070',  // dark pupil
  shine:  '#ffffff',
  cheek:  '#ffaabb',  // pink blush
  nose:   '#ff7799',
  earIn:  '#e080b0',  // inner ear pink
  mouth:  '#3d2070',
  dead:   '#999',
};

let frame = 0;

// Kawaii cat: 10×9 grid, centered in 12×12 canvas (offset 1,1)
// Shape drawn with explicit cell lists for full control.
function drawPet() {
  ctx.clearRect(0, 0, 48, 48);

  const s       = state;
  const alive   = s.alive;
  const sleep   = s.sleeping || s.animState === 'sleeping';
  const eating  = s.animState === 'eating';
  const petting = s.animState === 'petting';
  const playing = s.animState === 'playing';

  // Vertical bounce
  let dy = 0;
  if (alive && !sleep) {
    if (playing) dy = -Math.round(Math.abs(Math.sin(frame * 0.22)) * 1.5);
    else         dy =  Math.round(Math.sin(frame * 0.055) * 0.35); // breathe
  }
  dy = Math.round(dy); // keep it integer cells

  const ox = 1, oy = 1 + dy; // top-left origin of the 10×9 shape

  const bc = alive ? P.body    : P.dead;
  const tc = alive ? P.tummy   : '#bbb';

  // ── Ears (pointy cat ears at top) ──────────────────────────────────────────
  // Left ear: col 1-2, row 0
  cell(ox+1, oy+0, bc); cell(ox+2, oy+0, bc);
  // Right ear: col 7-8
  cell(ox+7, oy+0, bc); cell(ox+8, oy+0, bc);
  // Ear tips (row -1 above body)
  cell(ox+1, oy-1, bc);
  cell(ox+8, oy-1, bc);
  // Inner ear
  if (alive) {
    cell(ox+1, oy+0, P.earIn);
    cell(ox+8, oy+0, P.earIn);
  }

  // ── Head (rows 0-3, cols 0-9, rounded) ─────────────────────────────────────
  // row 0: cols 2-7
  for (let x=2; x<=7; x++) cell(ox+x, oy+0, bc);
  // row 1: cols 0-9
  for (let x=0; x<=9; x++) cell(ox+x, oy+1, bc);
  // row 2: cols 0-9
  for (let x=0; x<=9; x++) cell(ox+x, oy+2, bc);
  // row 3: cols 0-9
  for (let x=0; x<=9; x++) cell(ox+x, oy+3, bc);
  // row 4: cols 0-9 (body top)
  for (let x=0; x<=9; x++) cell(ox+x, oy+4, bc);

  // ── Body (rows 4-7) ─────────────────────────────────────────────────────────
  // rows 5-6: slightly narrower
  for (let y=5; y<=6; y++) for (let x=0; x<=9; x++) cell(ox+x, oy+y, bc);
  // row 7: taper bottom
  for (let x=1; x<=8; x++) cell(ox+x, oy+7, bc);

  // Tummy highlight (rows 3-6, cols 3-6)
  if (alive) {
    for (let y=3; y<=6; y++) for (let x=3; x<=6; x++) cell(ox+x, oy+y, tc);
  }

  // ── Legs ───────────────────────────────────────────────────────────────────
  const legBob = playing ? Math.round(Math.sin(frame * 0.3)) : 0;
  // left leg
  cell(ox+1, oy+8, bc); cell(ox+2, oy+8-legBob, bc);
  // right leg
  cell(ox+7, oy+8, bc); cell(ox+8, oy+8+legBob, bc);

  // ── Tail ───────────────────────────────────────────────────────────────────
  const tailWag = (alive && (petting || playing))
    ? Math.round(Math.sin(frame * 0.3) * 1.5)
    : 0;
  cell(ox+10, oy+5+tailWag, bc);
  cell(ox+10, oy+4+tailWag, bc);
  cell(ox+9,  oy+3+tailWag, bc); // already covered by body but ensures tail tip

  // ── Eyes ───────────────────────────────────────────────────────────────────
  // Left eye center: (ox+2, oy+2), Right eye center: (ox+7, oy+2)
  if (!alive) {
    // × eyes
    cell(ox+2, oy+2, '#666'); cell(ox+3, oy+3, '#666');
    cell(ox+3, oy+2, '#666'); cell(ox+2, oy+3, '#666');
    cell(ox+6, oy+2, '#666'); cell(ox+7, oy+3, '#666');
    cell(ox+7, oy+2, '#666'); cell(ox+6, oy+3, '#666');
  } else if (sleep) {
    // Closed eyes — two horizontal dashes
    cell(ox+2, oy+2, P.outline); cell(ox+3, oy+2, P.outline);
    cell(ox+6, oy+2, P.outline); cell(ox+7, oy+2, P.outline);
  } else {
    const blink = frame % 110 > 106;
    if (blink) {
      cell(ox+2, oy+2, P.outline); cell(ox+3, oy+2, P.outline);
      cell(ox+6, oy+2, P.outline); cell(ox+7, oy+2, P.outline);
    } else {
      // Left eye: 2×2 white at (ox+2, oy+2)
      cell(ox+2, oy+2, P.eyeW); cell(ox+3, oy+2, P.eyeW);
      cell(ox+2, oy+3, P.eyeW); cell(ox+3, oy+3, P.eyeW);
      // Right eye: 2×2 white at (ox+6, oy+2)
      cell(ox+6, oy+2, P.eyeW); cell(ox+7, oy+2, P.eyeW);
      cell(ox+6, oy+3, P.eyeW); cell(ox+7, oy+3, P.eyeW);

      // Pupils (bottom-right of each eye white)
      cell(ox+3, oy+3, P.pupil);
      cell(ox+7, oy+3, P.pupil);
      // Shine (top-left)
      cell(ox+2, oy+2, P.shine);
      cell(ox+6, oy+2, P.shine);
    }
  }

  // ── Blush cheeks ───────────────────────────────────────────────────────────
  if (alive) {
    cell(ox+1, oy+3, P.cheek);
    cell(ox+8, oy+3, P.cheek);
  }

  // ── Nose ───────────────────────────────────────────────────────────────────
  if (alive) cell(ox+4, oy+3, P.nose);

  // ── Mouth ──────────────────────────────────────────────────────────────────
  if (!alive) {
    cell(ox+3, oy+4, '#666'); cell(ox+4, oy+4, '#666'); cell(ox+5, oy+4, '#666');
  } else if (eating || petting || s.happy > 65) {
    // Happy: ∪ shape
    cell(ox+3, oy+4, P.mouth);
    cell(ox+6, oy+4, P.mouth);
    cell(ox+4, oy+5, P.mouth); cell(ox+5, oy+5, P.mouth);
  } else if (s.hunger < 30 || s.happy < 30) {
    // Sad: ∩ shape
    cell(ox+3, oy+5, P.mouth);
    cell(ox+6, oy+5, P.mouth);
    cell(ox+4, oy+4, P.mouth); cell(ox+5, oy+4, P.mouth);
  } else {
    // Neutral: — line
    cell(ox+4, oy+4, P.mouth); cell(ox+5, oy+4, P.mouth);
  }

  // ── ZZZ ────────────────────────────────────────────────────────────────────
  if (sleep && alive) {
    ctx.fillStyle = '#4a7a00';
    ctx.font = 'bold 5px monospace';
    ctx.fillText('z',  38, 14);
    ctx.fillText('Z',  41,  9);
    ctx.fillText('Z',  44,  5);
  }

  frame++;
}

// ─── UI update ────────────────────────────────────────────────────────────────
function clamp(v) { return Math.max(0, Math.min(100, v)); }
function barCls(v) { return v < 25 ? 'bar-fill low' : v < 50 ? 'bar-fill mid' : 'bar-fill'; }

function updateUI() {
  const s = state;
  [[hungerBar, hungerVal, s.hunger],
   [happyBar,  happyVal,  s.happy],
   [energyBar, energyVal, s.energy],
   [healthBar, healthVal, s.health]].forEach(([bar, val, v]) => {
    bar.style.width = clamp(v) + '%';
    val.textContent = Math.round(clamp(v));
    bar.className = barCls(v);
  });

  ageEl.textContent = `AGE ${Math.floor(s.age / 60)}m`;

  if (!s.alive)           moodEl.textContent = '💀';
  else if (s.sleeping)    moodEl.textContent = '😴';
  else if (s.health < 25) moodEl.textContent = '🤒';
  else if (s.hunger < 25) moodEl.textContent = '😫';
  else if (s.happy  < 25) moodEl.textContent = '😢';
  else if (s.energy < 25) moodEl.textContent = '😩';
  else if (s.happy  > 75) moodEl.textContent = '😄';
  else                     moodEl.textContent = '😊';
}

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnParticle(emoji, count = 1) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emoji;
    el.style.left   = (15 + Math.random() * 70) + '%';
    el.style.bottom = (30 + Math.random() * 20) + '%';
    el.style.animationDelay = (i * 130) + 'ms';
    petArea.appendChild(el);
    setTimeout(() => el.remove(), 1700);
  }
}

// ─── Game tick (every 5s) ─────────────────────────────────────────────────────
function gameTick() {
  if (!state.alive) return;
  state.age += 5;

  if (state.sleeping) {
    state.energy = Math.min(MAX, state.energy + 8);
    state.hunger = Math.max(0,   state.hunger - 2);
    if (state.energy >= MAX) wakeUp();
  } else {
    state.hunger = Math.max(0, state.hunger - 3);
    state.happy  = Math.max(0, state.happy  - 2);
    state.energy = Math.max(0, state.energy - 2);
  }

  const crits = [state.hunger, state.happy, state.energy].filter(v => v < 20).length;
  state.health = crits > 0
    ? Math.max(0, state.health - crits * 3)
    : Math.min(MAX, state.health + 1);

  if (state.health <= 0) { die(); return; }

  if (state.animState === 'idle') {
    if      (state.hunger < 25)     showMsg(rnd('hungry'));
    else if (state.happy  < 25)     showMsg(rnd('sad'));
    else if (state.energy < 25)     showMsg(rnd('tired'));
    else if (state.health < 50)     showMsg(rnd('sick'));
    else if (Math.random() < 0.35)  showMsg(rnd('idle'));
  }

  updateUI();
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function doAction(anim, ms, fn, emoji, msgKey, n = 1) {
  if (!state.alive) return;
  if (state.sleeping) { showMsg("Shh! I'm sleeping..."); return; }
  state.animState = anim;
  fn();
  spawnParticle(emoji, n);
  showMsg(rnd(msgKey));
  updateUI();
  clearTimeout(state.animTimer);
  state.animTimer = setTimeout(() => { state.animState = 'idle'; updateUI(); }, ms);
}

function feed()  { doAction('eating',  1600, () => { state.hunger = Math.min(MAX, state.hunger+25); state.energy = Math.min(MAX, state.energy+5); },  '🍎', 'eating',  2); }
function pet()   { doAction('petting', 1400, () => { state.happy  = Math.min(MAX, state.happy +20); state.health = Math.min(MAX, state.health+5); },  '💕', 'petting', 3); }
function play()  {
  if (state.energy < 15) { showMsg('Too tired to play...'); return; }
  doAction('playing', 2200, () => { state.happy = Math.min(MAX, state.happy+25); state.energy = Math.max(0, state.energy-20); state.hunger = Math.max(0, state.hunger-10); }, '🎉', 'playing', 2);
}
function sleep() {
  if (!state.alive) return;
  if (state.sleeping) { wakeUp(); return; }
  state.sleeping = true; state.animState = 'sleeping';
  showMsg(rnd('sleeping')); updateUI();
}
function wakeUp() {
  state.sleeping = false; state.animState = 'idle';
  showMsg(rnd('wakeup')); updateUI();
}
function die() {
  state.alive = false; state.animState = 'dead';
  showMsg(rnd('dead')); updateUI();
  const ov = document.createElement('div');
  ov.className = 'game-over';
  ov.innerHTML = `<div class="go-icon">💀</div><div class="go-title">MOCHI PASSED AWAY</div><div class="go-sub">Lived for ${Math.floor(state.age/60)} minutes</div><button class="restart-btn" id="restartBtn">TRY AGAIN</button>`;
  document.getElementById('screen').appendChild(ov);
  document.getElementById('restartBtn').addEventListener('click', restart);
}
function restart() {
  document.querySelectorAll('.game-over').forEach(e => e.remove());
  state = { hunger:80, happy:80, energy:80, health:80, age:0, alive:true, sleeping:false, animState:'idle', animTimer:0 };
  showMsg("I'm back! Take care of me~"); updateUI();
}

// ─── Loop ─────────────────────────────────────────────────────────────────────
function loop() { drawPet(); requestAnimationFrame(loop); }

document.getElementById('btnFeed').addEventListener('click', feed);
document.getElementById('btnPet').addEventListener('click',  pet);
document.getElementById('btnPlay').addEventListener('click', play);
document.getElementById('btnSleep').addEventListener('click', sleep);

setInterval(gameTick, 5000);
updateUI();
loop();
</script>
</body>
</html>
