<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CutePet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(ellipse at top, #1e1b4b, #0f0f1a);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', 'Courier New', monospace;
  }

  /* ── Device shell ── */
  .device {
    background: linear-gradient(160deg, #3b3a5e, #252438);
    border-radius: 36px 36px 48px 48px;
    padding: 20px 20px 28px;
    width: 320px;
    box-shadow:
      0 30px 60px #00000080,
      0 0 0 3px #4a4870,
      inset 0 2px 6px #ffffff18,
      inset 0 -4px 8px #00000040;
    position: relative;
  }

  /* little speaker dots */
  .device::before {
    content: '· · · · ·';
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 4px;
    color: #4a4870;
  }

  /* ── Screen bezel ── */
  .screen-bezel {
    background: #1a1828;
    border-radius: 20px;
    padding: 10px;
    box-shadow: inset 0 4px 12px #00000080, 0 2px 4px #ffffff0a;
  }

  /* ── LCD screen ── */
  .screen {
    background: #8fbc00;
    border-radius: 12px;
    height: 310px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* CRT scanlines */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 3px
    );
    pointer-events: none;
    z-index: 5;
    border-radius: 12px;
  }

  /* slight vignette */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.25) 100%);
    pointer-events: none;
    z-index: 4;
    border-radius: 12px;
  }

  /* ── Top bar: name + age + mood ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px 4px;
    background: #6a9a00;
    border-radius: 12px 12px 0 0;
    flex-shrink: 0;
  }

  .pet-name {
    font-size: 7px;
    color: #1a2e00;
    letter-spacing: 1px;
  }

  .top-center {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .age-badge {
    font-size: 6px;
    color: #1a2e00;
    background: #5a8800;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .mood-emoji {
    font-size: 14px;
    line-height: 1;
  }

  /* ── Stats panel ── */
  .stats {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 8px 10px 6px;
    background: #7aab00;
    flex-shrink: 0;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-icon {
    font-size: 11px;
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1;
    height: 7px;
    background: #4a7200;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: #1a3a00;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    position: relative;
  }

  /* shimmer on bars */
  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 40%;
    height: 50%;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
  }

  .bar-fill.low {
    background: #7a0000;
    animation: pulse-bar 1s ease infinite;
  }

  .bar-fill.mid { background: #5a5a00; }

  @keyframes pulse-bar {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .stat-val {
    font-size: 6px;
    color: #1a3a00;
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── Pet viewport ── */
  .pet-area {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  /* background ground line */
  .ground {
    position: absolute;
    bottom: 18px;
    left: 10%;
    right: 10%;
    height: 2px;
    background: #6a9a00;
    border-radius: 2px;
  }

  .pet-canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    position: relative;
    z-index: 2;
    /* 2× scale via CSS for a bigger cuter pet */
    width: 160px;
    height: 160px;
  }

  /* ── Message ticker ── */
  .message-box {
    background: #3a5a00;
    padding: 5px 10px;
    font-size: 7px;
    color: #c8e860;
    text-align: center;
    min-height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0 0 12px 12px;
    flex-shrink: 0;
    letter-spacing: 0.5px;
    z-index: 2;
    position: relative;
  }

  /* ── Particles ── */
  .particle {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    animation: floatUp 1.4s ease forwards;
    z-index: 10;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(0.8); }
    60%  { opacity: 1; transform: translateY(-50px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.6); }
  }

  /* ── Buttons area ── */
  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 18px;
    padding: 0 4px;
  }

  .btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .btn {
    background: linear-gradient(145deg, #312f52, #1e1c36);
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 6px 0 #0d0c1e,
      0 8px 16px #00000060,
      inset 0 1px 2px #ffffff18;
    transition: all 0.08s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    outline: none;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: linear-gradient(145deg, rgba(255,255,255,0.1), transparent);
    pointer-events: none;
  }

  .btn:hover {
    background: linear-gradient(145deg, #3e3c62, #28264a);
    transform: translateY(-2px);
    box-shadow:
      0 8px 0 #0d0c1e,
      0 10px 20px #00000070,
      inset 0 1px 2px #ffffff18;
  }

  .btn:active {
    transform: translateY(4px);
    box-shadow:
      0 2px 0 #0d0c1e,
      0 4px 8px #00000060,
      inset 0 1px 2px #ffffff18;
  }

  .btn-label {
    font-size: 6px;
    color: #6666aa;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── Brand ── */
  .device-label {
    text-align: center;
    margin-top: 14px;
    font-size: 8px;
    color: #4a4870;
    letter-spacing: 4px;
  }

  /* ── Game over overlay ── */
  .game-over {
    position: absolute;
    inset: 0;
    background: rgba(10,20,0,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 20;
    border-radius: 12px;
    backdrop-filter: blur(2px);
  }

  .game-over .go-icon { font-size: 36px; }
  .game-over .go-title { font-size: 9px; color: #c8e860; }
  .game-over .go-sub   { font-size: 7px; color: #7aaa30; margin-top: 2px; }

  .restart-btn {
    margin-top: 8px;
    background: #3a5a00;
    border: 2px solid #c8e860;
    color: #c8e860;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 7px;
    letter-spacing: 1px;
    transition: background 0.15s;
  }

  .restart-btn:hover { background: #5a8a00; }
</style>
</head>
<body>
<div class="device">
  <div class="screen-bezel">
    <div class="screen" id="screen">

      <!-- Top bar -->
      <div class="top-bar">
        <span class="pet-name">MOCHI</span>
        <div class="top-center">
          <span class="age-badge" id="ageIndicator">AGE 0m</span>
        </div>
        <span class="mood-emoji" id="moodIndicator">😊</span>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-row">
          <span class="stat-icon">🍔</span>
          <div class="bar-track"><div class="bar-fill" id="hungerBar" style="width:80%"></div></div>
          <span class="stat-val" id="hungerVal">80</span>
        </div>
        <div class="stat-row">
          <span class="stat-icon">💖</span>
          <div class="bar-track"><div class="bar-fill" id="happyBar" style="width:80%"></div></div>
          <span class="stat-val" id="happyVal">80</span>
        </div>
        <div class="stat-row">
          <span class="stat-icon">⚡</span>
          <div class="bar-track"><div class="bar-fill" id="energyBar" style="width:80%"></div></div>
          <span class="stat-val" id="energyVal">80</span>
        </div>
        <div class="stat-row">
          <span class="stat-icon">❤️</span>
          <div class="bar-track"><div class="bar-fill" id="healthBar" style="width:80%"></div></div>
          <span class="stat-val" id="healthVal">80</span>
        </div>
      </div>

      <!-- Pet -->
      <div class="pet-area" id="petArea">
        <div class="ground"></div>
        <canvas class="pet-canvas" id="petCanvas" width="80" height="80"></canvas>
      </div>

      <!-- Message -->
      <div class="message-box" id="messageBox">Hello! I'm Mochi~ Take care of me!</div>

    </div><!-- /screen -->
  </div><!-- /screen-bezel -->

  <!-- Buttons -->
  <div class="buttons">
    <div class="btn-wrap">
      <button class="btn" id="btnFeed">🍎</button>
      <span class="btn-label">Feed</span>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="btnPet">🤚</button>
      <span class="btn-label">Pet</span>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="btnPlay">🎮</button>
      <span class="btn-label">Play</span>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="btnSleep">💤</button>
      <span class="btn-label">Sleep</span>
    </div>
  </div>

  <div class="device-label">CUTEPET</div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const MAX = 100;
let state = {
  hunger: 80, happy: 80, energy: 80, health: 80,
  age: 0, alive: true, sleeping: false,
  animState: 'idle', animTimer: 0,
};

// ─── DOM ──────────────────────────────────────────────────────────────────────
const hungerBar = document.getElementById('hungerBar');
const happyBar  = document.getElementById('happyBar');
const energyBar = document.getElementById('energyBar');
const healthBar = document.getElementById('healthBar');
const hungerVal = document.getElementById('hungerVal');
const happyVal  = document.getElementById('happyVal');
const energyVal = document.getElementById('energyVal');
const healthVal = document.getElementById('healthVal');
const msgBox    = document.getElementById('messageBox');
const moodEl    = document.getElementById('moodIndicator');
const ageEl     = document.getElementById('ageIndicator');
const petArea   = document.getElementById('petArea');
const canvas    = document.getElementById('petCanvas');
const ctx       = canvas.getContext('2d');

// ─── Messages ─────────────────────────────────────────────────────────────────
const messages = {
  idle:     ['...', 'Looking at you~', 'La la la...', 'Feeling cozy!', '*yawns*'],
  hungry:   ["I'm hungry!", 'Feed me please!', 'My tummy hurts...', 'Food? Food?!'],
  sad:      ["I'm lonely...", 'Pet me!', 'I need attention!', 'Don\'t ignore me~'],
  tired:    ['Yawn...', 'So sleepy...', 'Need rest...', '*eyes drooping*'],
  sick:     ['Not feeling well...', 'I need care!', 'Ouch...'],
  eating:   ['Yum yum!', 'Delicious!', 'So good!', 'Nom nom nom!', 'More please!'],
  petting:  ['Purr~', 'So nice!', 'I love you!', '♥ ♥ ♥', '*happy wiggle*'],
  playing:  ['Wheee!', 'This is fun!', 'Again! Again!', 'Yay!', 'Catch me!'],
  sleeping: ['Zzz...', '...zzz...', 'Sweet dreams~'],
  wakeup:   ['Good morning!', 'I feel refreshed!', 'That was nice!'],
  dead:     ['...', 'Goodbye...'],
};

function rnd(key) {
  const a = messages[key];
  return a[Math.floor(Math.random() * a.length)];
}
function showMsg(t) { msgBox.textContent = t; }

// ─── Pixel pet (cuter cat/blob design) ───────────────────────────────────────
// 80×80 canvas, each "pixel" = 8px (10 logical pixels wide)
const S = 8;

function px(x, y, c) {
  ctx.fillStyle = c;
  ctx.fillRect(x * S, y * S, S, S);
}

// Color palette
const C = {
  body:   '#3a2a5e',   // deep purple body
  belly:  '#6a5a8e',   // lighter belly
  face:   '#3a2a5e',
  eye:    '#ffffff',
  pupil:  '#1a0a3e',
  shine:  '#ffffff',
  cheek:  '#ff8fa0',   // pink cheeks
  nose:   '#ff6688',
  mouth:  '#3a2a5e',
  ear_in: '#9a6aae',
  outline:'#1a0a2e',
  dead:   '#888',
  deadEye:'#444',
  zzz:    '#6a9a00',
};

let frame = 0;

function drawPet() {
  ctx.clearRect(0, 0, 80, 80);

  const s = state;
  const alive = s.alive;
  const sleeping = s.sleeping || s.animState === 'sleeping';

  // Vertical bob
  let dy = 0;
  if (alive && !sleeping) {
    if (s.animState === 'playing') {
      dy = Math.round(Math.sin(frame * 0.25) * 1.5);
    } else {
      dy = Math.round(Math.sin(frame * 0.05) * 0.4); // gentle breathe
    }
  }

  const bc = alive ? C.body   : C.dead;
  const bl = alive ? C.belly  : '#aaa';
  const ec = alive ? C.eye    : C.deadEye;
  const pc = alive ? C.pupil  : '#666';

  // ── Body: rounded 6×5 blob at (2, 3+dy) ──
  const bx = 2, by = 3 + dy;

  // Body pixels (relative to bx, by)
  const bodyShape = [
    [1,0],[2,0],[3,0],[4,0],
    [0,1],[1,1],[2,1],[3,1],[4,1],[5,1],
    [0,2],[1,2],[2,2],[3,2],[4,2],[5,2],
    [0,3],[1,3],[2,3],[3,3],[4,3],[5,3],
    [1,4],[2,4],[3,4],[4,4],
  ];
  bodyShape.forEach(([x,y]) => px(bx+x, by+y, bc));

  // Belly highlight
  [[2,2],[3,2],[2,3],[3,3]].forEach(([x,y]) => px(bx+x, by+y, bl));

  // ── Ears (at top of body) ──
  px(bx+0, by-1, bc);
  px(bx+1, by-1, bc);
  px(bx+4, by-1, bc);
  px(bx+5, by-1, bc);
  // inner ear color
  if (alive) {
    px(bx+0, by-1, C.ear_in);
    px(bx+5, by-1, C.ear_in);
  }

  // ── Tail ──
  const tailWag = (alive && (s.animState === 'petting' || s.animState === 'playing'))
    ? Math.round(Math.sin(frame * 0.35) * 1)
    : 0;
  px(bx+6, by+2+tailWag, bc);
  px(bx+7, by+1+tailWag, bc);
  px(bx+7, by+tailWag, bc);

  // ── Legs ──
  const walk = (alive && s.animState === 'playing')
    ? Math.round(Math.sin(frame * 0.4))
    : 0;
  px(bx+1, by+5, bc);
  px(bx+4, by+5, bc);
  if (s.animState === 'playing') {
    px(bx+1, by+5-walk, bc);
    px(bx+4, by+5+walk, bc);
  }

  // ── Eyes ──
  if (!alive) {
    // X eyes
    px(bx+1, by+1, ec); px(bx+2, by+2, ec);
    px(bx+2, by+1, ec); px(bx+1, by+2, ec);
    px(bx+3, by+1, ec); px(bx+4, by+2, ec);
    px(bx+4, by+1, ec); px(bx+3, by+2, ec);
  } else if (sleeping) {
    // Closed arcs (3 pixels each)
    px(bx+1, by+2, C.cheek);
    px(bx+2, by+1, C.cheek);
    px(bx+3, by+2, C.cheek);
    px(bx+4, by+1, C.cheek);
    // "—" lids
    px(bx+1, by+2, bc); px(bx+2, by+2, bc);
    px(bx+3, by+2, bc); px(bx+4, by+2, bc);
  } else {
    const blink = frame % 100 > 96;
    if (blink) {
      // blink: flat line
      px(bx+1, by+2, ec);
      px(bx+2, by+2, ec);
      px(bx+4, by+2, ec);
      px(bx+3, by+2, ec);
    } else {
      // Normal round eyes: 2×2 white + pupil
      px(bx+1, by+1, ec); px(bx+2, by+1, ec);
      px(bx+1, by+2, ec); px(bx+2, by+2, ec);
      px(bx+3, by+1, ec); px(bx+4, by+1, ec);
      px(bx+3, by+2, ec); px(bx+4, by+2, ec);
      // pupils (shift with anim)
      const px_shift = (s.animState === 'eating') ? 1 : 0;
      px(bx+2+px_shift, by+2, pc);
      px(bx+4+px_shift, by+2, pc);
      // eye shine
      px(bx+1, by+1, C.shine);
      px(bx+3, by+1, C.shine);
    }
  }

  // ── Cheeks ──
  if (alive) {
    px(bx+0, by+3, C.cheek);
    px(bx+5, by+3, C.cheek);
  }

  // ── Nose ──
  if (alive) px(bx+2, by+3, C.nose);

  // ── Mouth ──
  if (!alive) {
    px(bx+2, by+4, ec); px(bx+3, by+4, ec);
  } else if (s.animState === 'eating' || s.animState === 'petting' || s.happy > 60) {
    // Happy curved mouth
    px(bx+1, by+4, bc);
    px(bx+2, by+3, bc);
    px(bx+3, by+3, bc);
    px(bx+4, by+4, bc);
  } else if (s.hunger < 30 || s.happy < 30) {
    // Sad mouth
    px(bx+1, by+3, bc);
    px(bx+2, by+4, bc);
    px(bx+3, by+4, bc);
    px(bx+4, by+3, bc);
  } else {
    // Neutral
    px(bx+2, by+4, bc);
    px(bx+3, by+4, bc);
  }

  // ── ZZZ when sleeping ──
  if (sleeping && alive) {
    ctx.fillStyle = C.zzz;
    ctx.font = 'bold 7px monospace';
    ctx.fillText('z', 62, 22 + dy * S);
    ctx.fillText('Z', 66, 14 + dy * S);
    ctx.fillText('Z', 70, 6  + dy * S);
  }

  // ── Stars/hearts when playing/petting ──
  if (alive && s.animState === 'playing' && frame % 20 < 4) {
    ctx.fillStyle = C.cheek;
    ctx.fillText('★', 58, 28);
  }

  frame++;
}

// ─── UI update ────────────────────────────────────────────────────────────────
function clamp(v) { return Math.max(0, Math.min(100, v)); }

function barClass(v) {
  if (v < 25) return 'low';
  if (v < 50) return 'mid';
  return '';
}

function updateUI() {
  const s = state;
  const vals = [
    [hungerBar, hungerVal, s.hunger],
    [happyBar,  happyVal,  s.happy],
    [energyBar, energyVal, s.energy],
    [healthBar, healthVal, s.health],
  ];
  vals.forEach(([bar, val, v]) => {
    bar.style.width = clamp(v) + '%';
    val.textContent = Math.round(clamp(v));
    bar.className = 'bar-fill ' + barClass(v);
  });

  const mins = Math.floor(s.age / 60);
  ageEl.textContent = `AGE ${mins}m`;

  if (!s.alive)           moodEl.textContent = '💀';
  else if (s.sleeping)    moodEl.textContent = '😴';
  else if (s.health < 25) moodEl.textContent = '🤒';
  else if (s.hunger < 25) moodEl.textContent = '😫';
  else if (s.happy  < 25) moodEl.textContent = '😢';
  else if (s.energy < 25) moodEl.textContent = '😩';
  else if (s.happy  > 75) moodEl.textContent = '😄';
  else                     moodEl.textContent = '😊';
}

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnParticle(emoji, count = 1) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emoji;
    el.style.left   = (15 + Math.random() * 70) + '%';
    el.style.bottom = (25 + Math.random() * 20) + '%';
    el.style.animationDelay = (i * 120) + 'ms';
    petArea.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }
}

// ─── Tick (every 5s) ─────────────────────────────────────────────────────────
function gameTick() {
  if (!state.alive) return;
  state.age += 5;

  if (state.sleeping) {
    state.energy = Math.min(MAX, state.energy + 8);
    state.hunger = Math.max(0,   state.hunger - 2);
    if (state.energy >= MAX) wakeUp();
  } else {
    state.hunger = Math.max(0, state.hunger - 3);
    state.happy  = Math.max(0, state.happy  - 2);
    state.energy = Math.max(0, state.energy - 2);
  }

  const criticals = [state.hunger, state.happy, state.energy].filter(v => v < 20).length;
  if (criticals > 0) {
    state.health = Math.max(0, state.health - criticals * 3);
  } else {
    state.health = Math.min(MAX, state.health + 1);
  }

  if (state.health <= 0) { die(); return; }

  if (state.animState === 'idle') {
    if      (state.hunger < 25)       showMsg(rnd('hungry'));
    else if (state.happy  < 25)       showMsg(rnd('sad'));
    else if (state.energy < 25)       showMsg(rnd('tired'));
    else if (state.health < 50)       showMsg(rnd('sick'));
    else if (Math.random() < 0.35)    showMsg(rnd('idle'));
  }

  updateUI();
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function doAction(anim, duration, statFn, emoji, msgKey, particleCount = 1) {
  if (!state.alive) return;
  if (state.sleeping) {
    showMsg("Shh! I'm sleeping...");
    return;
  }
  state.animState = anim;
  statFn();
  spawnParticle(emoji, particleCount);
  showMsg(rnd(msgKey));
  updateUI();

  clearTimeout(state.animTimer);
  state.animTimer = setTimeout(() => {
    state.animState = 'idle';
    updateUI();
  }, duration);
}

function feed() {
  doAction('eating', 1600,
    () => { state.hunger = Math.min(MAX, state.hunger + 25); state.energy = Math.min(MAX, state.energy + 5); },
    '🍎', 'eating', 2);
}

function pet() {
  doAction('petting', 1400,
    () => { state.happy = Math.min(MAX, state.happy + 20); state.health = Math.min(MAX, state.health + 5); },
    '💕', 'petting', 3);
}

function play() {
  if (state.energy < 15) { showMsg('Too tired to play...'); return; }
  doAction('playing', 2200,
    () => { state.happy = Math.min(MAX, state.happy + 25); state.energy = Math.max(0, state.energy - 20); state.hunger = Math.max(0, state.hunger - 10); },
    '🎉', 'playing', 2);
}

function sleep() {
  if (!state.alive) return;
  if (state.sleeping) { wakeUp(); return; }
  state.sleeping  = true;
  state.animState = 'sleeping';
  showMsg(rnd('sleeping'));
  updateUI();
}

function wakeUp() {
  state.sleeping  = false;
  state.animState = 'idle';
  showMsg(rnd('wakeup'));
  updateUI();
}

function die() {
  state.alive     = false;
  state.animState = 'dead';
  showMsg(rnd('dead'));
  updateUI();

  const ov = document.createElement('div');
  ov.className = 'game-over';
  ov.innerHTML = `
    <div class="go-icon">💀</div>
    <div class="go-title">MOCHI PASSED AWAY</div>
    <div class="go-sub">Lived for ${Math.floor(state.age / 60)} minutes</div>
    <button class="restart-btn" id="restartBtn">TRY AGAIN</button>
  `;
  document.getElementById('screen').appendChild(ov);
  document.getElementById('restartBtn').addEventListener('click', restart);
}

function restart() {
  document.querySelectorAll('.game-over').forEach(e => e.remove());
  state = { hunger: 80, happy: 80, energy: 80, health: 80, age: 0, alive: true, sleeping: false, animState: 'idle', animTimer: 0 };
  showMsg("I'm back! Take care of me~");
  updateUI();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function loop() { drawPet(); requestAnimationFrame(loop); }

// ─── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('btnFeed').addEventListener('click', feed);
document.getElementById('btnPet').addEventListener('click',  pet);
document.getElementById('btnPlay').addEventListener('click', play);
document.getElementById('btnSleep').addEventListener('click', sleep);

setInterval(gameTick, 5000);
updateUI();
loop();
</script>
</body>
</html>
